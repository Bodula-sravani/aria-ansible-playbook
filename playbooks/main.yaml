- name: Catalog driven post configuration
  hosts: all
  gather_facts: true
  become: true

  vars:
    join_ad: false
    configure_dns: false
    install_monitoring: false
    install_security: false

  tasks:

    - name: Print received variables
      debug:
        msg:
          join_ad: "{{ join_ad }}"
          configure_dns: "{{ configure_dns }}"
          install_monitoring: "{{ install_monitoring }}"
          install_security: "{{ install_security }}"

    # =============================
    # Execute Roles
    # =============================

    - name: Run AD role
      include_role:
        name: ad_join
      when: join_ad

    - name: Run DNS role
      include_role:
        name: dns_config
      when: configure_dns

    - name: Run Monitoring role
      include_role:
        name: monitoring_agent
      when: install_monitoring

    - name: Run Security role
      include_role:
        name: security_agent
      when: install_security

    # =============================
    # VALIDATION SECTION
    # =============================

    - name: Check node_exporter service
      command: systemctl is-active node_exporter
      register: node_exporter_status
      failed_when: node_exporter_status.stdout != "active"
      changed_when: false
      when: install_monitoring

    - name: Check osquery service
      command: systemctl is-active osqueryd
      register: osquery_status
      failed_when: osquery_status.stdout != "active"
      changed_when: false
      when: install_security

    # =============================
    # BUILD FINAL STATE
    # =============================

    - name: Build state object
      set_fact:
        postconfig_state:
          ad: "{{ 'completed' if join_ad else 'skipped' }}"
          dns: "{{ 'completed' if configure_dns else 'skipped' }}"
          monitoring: >-
            {{ 'completed' if (install_monitoring and node_exporter_status.stdout == 'active')
               else ('skipped' if not install_monitoring else 'failed') }}
          security: >-
            {{ 'completed' if (install_security and osquery_status.stdout == 'active')
               else ('skipped' if not install_security else 'failed') }}

    - name: Ensure state directory exists
      file:
        path: /opt/postconfig
        state: directory
        mode: '0755'

    - name: Write state file
      copy:
        content: "{{ postconfig_state | to_nice_json }}"
        dest: /opt/postconfig/state.json

    - name: Final Completion Message
      debug:
        msg: |
          ======================================
          Post Configuration Completed
          AD: {{ postconfig_state.ad }}
          DNS: {{ postconfig_state.dns }}
          Monitoring: {{ postconfig_state.monitoring }}
          Security: {{ postconfig_state.security }}
          ======================================
